version: '3.8'

# DRP Production Docker Compose
# Decentralized Rights Protocol with PoST + PoAT consensus

services:
  # DRP Blockchain Node (RPC Server)
  drp-node:
    build:
      context: .
      dockerfile: docker/Dockerfile.drp-node
    container_name: drp-node
    ports:
      - "${RPC_PORT:-8545}:8545"
    volumes:
      - drp-chain-data:/app/data/chain
      - drp-logs:/app/logs
    environment:
      - RPC_HOST=0.0.0.0
      - RPC_PORT=8545
      - BLOCKCHAIN_NETWORK=${BLOCKCHAIN_NETWORK:-drp-testnet}
      - BLOCKCHAIN_RPC_URL=http://drp-node:8545
      - IPFS_API_URL=http://ipfs:5001/api/v0
      - IPFS_GATEWAY_URL=http://ipfs:8080/ipfs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - drp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # IPFS Node for decentralized storage
  ipfs:
    image: ipfs/go-ipfs:v0.20.0
    container_name: drp-ipfs
    ports:
      - "4001:4001"   # IPFS swarm
      - "4001:4001/udp"
      - "5001:5001"   # IPFS API
      - "8080:8080"   # IPFS Gateway
    volumes:
      - ipfs-data:/data/ipfs
      - ipfs-staging:/data/ipfs/staging
    environment:
      - IPFS_PROFILE=server
      - IPFS_SWARM_ADDRS=/ip4/0.0.0.0/tcp/4001,/ip6/::/tcp/4001
    networks:
      - drp-network
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # DRP AI Verification Service
  drp-ai:
    build:
      context: .
      dockerfile: docker/Dockerfile.drp-ai
    container_name: drp-ai
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - drp-ai-logs:/app/logs
      - drp-ai-data:/app/data
    environment:
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - BLOCKCHAIN_RPC_URL=http://drp-node:8545
      - IPFS_API_URL=http://ipfs:5001/api/v0
      - IPFS_GATEWAY_URL=http://ipfs:8080/ipfs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AI_API_KEY=${AI_API_KEY:-}
    networks:
      - drp-network
    depends_on:
      drp-node:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: drp-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
      # Uncomment for SSL certificates
      # - ./docker/ssl:/etc/letsencrypt:ro
    networks:
      - drp-network
    depends_on:
      - drp-node
      - ipfs
      - drp-ai
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  # Blockchain chain data (persistent)
  drp-chain-data:
    driver: local
  # IPFS data (persistent)
  ipfs-data:
    driver: local
  ipfs-staging:
    driver: local
  # Logs
  drp-logs:
    driver: local
  drp-ai-logs:
    driver: local
  nginx-logs:
    driver: local
  # AI service data
  drp-ai-data:
    driver: local

networks:
  drp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16



