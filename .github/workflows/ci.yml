name: DRP CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Render-safe dependencies
        run: pip install -r requirements.render.txt pytest pytest-asyncio httpx

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 api/ ai/ core/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Run tests
        env:
          LOG_LEVEL: WARNING
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-secret-for-ci
          API_HOST: "0.0.0.0"
          API_PORT: "8000"
          BLOCKCHAIN_NETWORK: drp-testnet
        run: pytest tests/ -v --tb=short -x || pytest test_local.py -v --tb=short || echo "No tests found — add tests/test_api.py"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r api/ ai/ core/ -ll --skip B101,B601 || true
