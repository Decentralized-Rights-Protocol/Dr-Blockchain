services:
  - type: web
    name: drp-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000
      - key: BLOCKCHAIN_NETWORK
        value: drp-testnet
      - key: CHAIN_ID
        value: drp-testnet
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
