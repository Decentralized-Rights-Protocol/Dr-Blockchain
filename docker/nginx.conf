# Nginx reverse proxy configuration for DRP
# Routes: /rpc -> drp-node, /ipfs -> ipfs gateway, /ai -> drp-ai

upstream drp_node {
    server drp-node:8545;
}

upstream ipfs_gateway {
    server ipfs:8080;
}

upstream drp_ai {
    server drp-ai:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # RPC endpoint - blockchain node
    location /rpc {
        limit_req zone=rpc_limit burst=20 nodelay;
        
        proxy_pass http://drp_node/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for blockchain operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # IPFS Gateway endpoint
    location /ipfs {
        proxy_pass http://ipfs_gateway/ipfs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # IPFS can be slow
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # AI verification endpoints
    # Backend has endpoints at /ai/verify-activity, so preserve /ai prefix
    location /ai {
        limit_req zone=ai_limit burst=50 nodelay;
        
        proxy_pass http://drp_ai;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers for AI endpoints
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Default location
    location / {
        return 404 "DRP API - Use /rpc, /ipfs, or /ai endpoints";
    }
}

